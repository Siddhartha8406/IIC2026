<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Notes Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

    <div id="google_translate_element" style="display:none;"></div>

    <div class="main-panel">
        <!-- Top Title Header -->
        <div class="panel-header">
            <div class="header-title-group">
                <h3>NCC Custom Assistant</h3>
                <span class="sub-badge" id="currentFileBadge">
                    {% if filename %} Active Manual: {{ filename }} {% else %} Ingest operational files below {% endif %}
                </span>
            </div>
        </div>

        <!-- Top Upload Strip / Exit Controls -->
        <div class="upload-utility-bar">
            <div style="display: flex; gap: 8px; align-items: center;">
                <a href="/" style="text-decoration: none;">
                    <button class="btn-upload" style="background: #ffffff; border-color: #d0d7de;">&larr; Dashboard</button>
                </a>
                <div class="upload-btn-wrapper">
                    <button class="btn-upload" id="uploadLabel">Choose PDF File</button>
                    <input type="file" id="pdfFile" accept=".pdf" onchange="uploadPDF()">
                </div>
            </div>
            <span id="uploadStatus" style="color: #6e7781;">Awaiting target validation</span>
        </div>

        <!-- Chat History Viewport -->
        <div class="chat-history" id="chat-history">
            <div class="ai-msg" id="initial-prompt">
                <div class="msg-body" style="white-space: pre-wrap;">
                    <div class="text-line">Welcome. Load your reference manual context via the tool strip above. Once processed, the interface parameters will align automatically.</div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Bottom Chat Input Bar -->
        <div class="input-area">
            <input type="text" id="questionInput" class="locked-state" placeholder="Awaiting file upload above..." disabled>
            <button class="transmit-btn locked-state" id="transmitBtn" onclick="askQuestion()" disabled>Send</button>
        </div>
    </div>

    <script>
        let currentUtterance = null;

        document.addEventListener("DOMContentLoaded", () => {
            const hasFile = "{{ filename }}".trim().length > 0;
            if (hasFile) {
                unlockUI("System Ready");
            }
        });

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        async function translateMessage(containerId, langCode) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const bodyTextNode = container.querySelector('.msg-body');
            
            if (!container.getAttribute('data-english-audio-text')) {
                container.setAttribute('data-english-audio-text', bodyTextNode.innerText);
            }

            if (langCode === 'en') {
                if (bodyTextNode.getAttribute('data-original-html')) {
                    bodyTextNode.innerHTML = bodyTextNode.getAttribute('data-original-html');
                }
                return;
            }

            if (!bodyTextNode.getAttribute('data-original-html')) {
                bodyTextNode.setAttribute('data-original-html', bodyTextNode.innerHTML);
            }

            const textNodesToTranslate = [];
            const walkDOM = (node) => {
                if (node.nodeType === Node.TEXT_NODE && node.nodeValue.trim().length > 0) {
                    textNodesToTranslate.push(node);
                } else {
                    if (node.classList && node.classList.contains('bullet-marker')) return;
                    for (let child of node.childNodes) {
                        walkDOM(child);
                    }
                }
            };
            
            walkDOM(bodyTextNode);

            for (let node of textNodesToTranslate) {
                const rawText = node.nodeValue.trim();
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${langCode}&dt=t&q=${encodeURIComponent(rawText)}`;

                try {
                    const res = await fetch(url);
                    const result = await res.json();
                    if (result && result[0]) {
                        let translatedText = result[0].map(part => part[0]).join('');
                        node.nodeValue = node.nodeValue.replace(rawText, translatedText);
                    }
                } catch (err) {
                    console.error("Node translation failed: ", err);
                }
            }
        }

        function parseMarkdown(text) {
            if (!text) return "";
            
            let html = text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;").replace(/'/g, "&#039;");

            html = html.replace(/^[\s]*[\*|-]{3,}[\s]*$/gm, '<hr class="section-divider">');
            html = html.replace(/^[\s]*###[\s]+(.*)$/gm, '<h3>$1</h3>');
            html = html.replace(/^[\s]*##[\s]+(.*)$/gm, '<h2>$1</h2>');
            
            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            
            html = html.replace(/\b(First|Second|Third|Fourth|Fifth|One|Two|Three|Question|Note)\b/gi, '<strong>$1</strong>');

            html = html.split('\n')
                .map(line => {
                    let trimmed = line.trim();
                    if (!trimmed) return '<div style="height: 12px;"></div>';
                    
                    if (trimmed.startsWith('<h3') || trimmed.startsWith('<h2') || trimmed.startsWith('<hr')) return line;
                    
                    if (trimmed.startsWith('* ')) {
                        return `<div class="bullet-item" style="margin-left: 20px; margin-bottom: 6px;"><span class="bullet-marker" style="margin-right: 8px; color: #0969da;">•</span><span class="bullet-text">${trimmed.substring(2)}</span></div>`;
                    }
                    
                    if (trimmed.includes('<strong>One</strong>') || trimmed.includes('<strong>Two</strong>') || trimmed.includes('<strong>Three</strong>')) {
                        return `<div class="text-line" style="margin-left: 20px; margin-bottom: 6px; line-height: 1.6;">${trimmed}</div>`;
                    }
                    
                    return `<div class="text-line" style="margin-bottom: 6px; line-height: 1.6;">${trimmed}</div>`;
                }).join('');

            return html;
        }

        function unlockUI(statusText) {
            const statusLabel = document.getElementById('uploadStatus');
            const questionInput = document.getElementById('questionInput');
            const transmitBtn = document.getElementById('transmitBtn');
            const initialPrompt = document.getElementById('initial-prompt');

            statusLabel.style.color = "#2da44e"; 
            statusLabel.innerText = statusText;

            questionInput.classList.remove('locked-state');
            questionInput.removeAttribute('disabled');
            questionInput.placeholder = "Ask a question about the notes...";
            
            transmitBtn.classList.remove('locked-state');
            transmitBtn.removeAttribute('disabled');

            if (initialPrompt) {
                const bodyNode = initialPrompt.querySelector('.msg-body');
                if (bodyNode) {
                    bodyNode.innerHTML = `<div class="text-line">Manual parsed and ready. Awaiting cadet queries.</div>`;
                }
            }
        }

        async function uploadPDF() {
            const fileInput = document.getElementById('pdfFile');
            const statusLabel = document.getElementById('uploadStatus');
            const uploadLabel = document.getElementById('uploadLabel');
            const fileBadge = document.getElementById('currentFileBadge');
            
            if (!fileInput.files[0]) return;

            uploadLabel.innerText = "Processing...";
            statusLabel.style.color = "#0969da"; 
            statusLabel.innerText = "Ingesting data payload...";

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.message) { 
                    uploadLabel.innerText = "Loaded";
                    fileBadge.innerText = "Active Manual: " + fileInput.files[0].name;
                    unlockUI("ANO System Active");
                } else { 
                    statusLabel.style.color = "#cf222e"; 
                    statusLabel.innerText = "Upload failed"; 
                    uploadLabel.innerText = "Retry";
                }
            } catch (err) {
                statusLabel.style.color = "#cf222e";
                statusLabel.innerText = "Network Link Drop";
                uploadLabel.innerText = "Error";
            }
        }

        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const history = document.getElementById('chat-history');
            const indicator = document.getElementById('typingIndicator');
            const query = input.value.trim();
            
            if (!query) return;

            const cleanUserQuery = query.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            indicator.insertAdjacentHTML('beforebegin', `<div class="user-msg">${cleanUserQuery}</div>`);
            input.value = "";
            
            indicator.style.display = "block";
            history.scrollTop = history.scrollHeight;

            const formData = new FormData();
            formData.append("question", query);
            formData.append("mode", "teaching"); 

            try {
                const res = await fetch('/ask', { method: 'POST', body: formData });
                const data = await res.json();

                indicator.style.display = "none";
                const responseId = 'ai-msg-' + Date.now();
                const formattedAiResponse = parseMarkdown(data.response);
                
                const aiMessageHtml = `
                    <div class="ai-msg" id="${responseId}">
                        <div class="msg-controls">
                            <select class="translate-dropdown" onchange="translateMessage('${responseId}', this.value)">
                                <option value="en">Translate (EN)</option>
                                <option value="hi">Hindi (हिन्दी)</option>
                                <option value="kn">Kannada (ಕನ್ನಡ)</option>
                                <option value="te">Telugu (ತೆಲುಗು)</option>
                                <option value="ta">Tamil (தமிழ்)</option>
                            </select>
                            <button class="audio-btn" onclick="toggleSpeech('${responseId}')">🔊 Listen</button>
                        </div>
                        <div class="msg-body" style="white-space: pre-wrap;">${formattedAiResponse}</div>
                    </div>
                `;
                
                indicator.insertAdjacentHTML('beforebegin', aiMessageHtml);
                document.getElementById(responseId)?.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (err) {
                indicator.style.display = "none";
                indicator.insertAdjacentHTML('beforebegin', `<div class="ai-msg" style="border-left: 4px solid #cf222e;"><div class="msg-body"><div class="text-line">Communication link drop.</div></div></div>`);
                history.scrollTop = history.scrollHeight;
            }
        }

        function toggleSpeech(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let textContent = container.getAttribute('data-english-audio-text') || container.querySelector('.msg-body').innerText;
            const button = container.querySelector('.audio-btn');

            if (window.speechSynthesis.speaking && currentUtterance && currentUtterance.targetId === containerId) {
                window.speechSynthesis.cancel();
                if (button) { button.innerText = "🔊 Listen"; button.classList.remove('speaking'); }
                return;
            }

            window.speechSynthesis.cancel();
            document.querySelectorAll('.audio-btn').forEach(btn => { btn.innerText = "🔊 Listen"; btn.classList.remove('speaking'); });

            currentUtterance = new SpeechSynthesisUtterance(textContent);
            currentUtterance.targetId = containerId;
            currentUtterance.rate = 1.0;  
            currentUtterance.pitch = 0.95; 

            currentUtterance.onend = () => { if (button) { button.innerText = "🔊 Listen"; button.classList.remove('speaking'); } };
            if (button) { button.innerText = "🛑 Stop"; button.classList.add('speaking'); }
            window.speechSynthesis.speak(currentUtterance);
        }
    </script>
</body>
</html>
